name: Deploy VPS

on:
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare VPS deploy path
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "mkdir -p '${{ secrets.DEPLOY_PATH }}'"

      - name: Sync repository to VPS
        run: |
          rsync -az --delete \
            --exclude ".env" \
            --exclude ".env.vps" \
            --exclude "backend/.env" \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "backend/node_modules" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Deploy VPS stack
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            cd '${{ secrets.DEPLOY_PATH }}' && \
            docker compose --env-file .env.vps -f docker-compose.vps.yml up -d --build
          "

      - name: Verify deployed domain
        if: ${{ secrets.PRODUCTION_URL != '' }}
        run: node scripts/postDeployCheck.mjs "${{ secrets.PRODUCTION_URL }}"
